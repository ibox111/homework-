<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com" />
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,700;1,100;1,400;1,700&display=swap"
			rel="stylesheet" />
		<script
			src="https://kit.fontawesome.com/9d2bcfad30.js"
			crossorigin="anonymous"></script>
		
			<style>
				* {
	box-sizing: border-box;
	font-family: inherit;
}

body {
	font-family: "Poppins", sans-serif;
	text-align: center;
}

.container {
	display: grid;
	gap: 1rem;
	width: 650px;
	margin: 0 auto;
	padding: 1.5rem;
}

.container > div {
	border: 1px solid #5c5c5c;
	border-radius: 10px;
}

/* text section -------------------------- */

.text-section {
	padding: 1rem;
}

.text-section h1,
.text-section p {
	margin: 0;
}

/* icon section -------------------------- */

.icon-section {
	display: flex;
	justify-content: space-evenly;
	gap: 1rem;
}

.fa-house,
.fa-user,
.fa-envelope,
.fa-phone,
.fa-cart-shopping,
.fa-heart {
	font-size: 2rem;
}

.icon-section div {
	width: fit-content;
	padding: 0.5rem;
	margin: 0.5rem;
}

.icon-section p {
	margin: 0;
	margin-top: 0.5rem;
}

/* button section -------------------------- */

.button-section {
	display: flex;
	justify-content: space-evenly;
	gap: 1rem;
	padding: 1rem;
}

.button-section button {
	padding: 0.5rem 1.5rem;
	border: none;
	border-radius: 5px;
	font-weight: bold;
	color: white;
	background-color: rgb(69, 1, 100);
	cursor: pointer;
}

.button-section button:hover {
	background-color: #00198b;
}

.button-section button:active {
	background-color: #00198b;
}

/* input section -------------------------- */

.input-section {
	padding: 0.5rem;
}

.input-section input {
	width: 100%;
	padding: 0.5rem;
	border-radius: 5px;
	outline: none;
	border: 1px solid rgb(255, 255, 255);
}

.input-section input:focus {
	border-color: #ff0101;
	box-shadow: #620000 0px 0px 5px 0px;
}

/* link section -------------------------- */

.link-section {
	display: flex;
	justify-content: space-evenly;
	padding: 1rem;
}

.Visited:visited {
	color: red;
}

/* card section -------------------------- */

.card-section {
	padding: 1.2rem;
}

.card-section strong {
	border: #006262 2px solid;
	margin: 0;
	padding: 0.5rem 3rem;
	border-radius: 5px;
}

.card-section strong::before {
	content: "⭐";
	margin-right: 1rem;
}

.card-section strong::after {
	content: "✔️";
	margin-left: 1rem;
}

/* paragraph section -------------------------- */

.paragraph-section {
	padding: 1rem;
}

.paragraph-section p {
	text-align: justify;
	margin: 0;
}

.paragraph-section p::first-letter {
	font-size: 2rem;
	color: red;
}

.paragraph-section p::first-line {
	font-weight: bold;
}

.paragraph-section p::selection {
	background-color: red;
	color: white;
}

			</style>
		<title>CSS PRACTICE</title>
	</head>
	<body>
		<div class="container">
			<div class="text-section">
				<h1>Welcome to My Website</h1>
				<p>This is using Google font (Poppins).</p>
			</div>
			<div class="icon-section">
				<div class="icon-box">
					<i class="fa-solid fa-house"></i>
					<p>House</p>
				</div>
				<div class="icon-box">
					<i class="fa-solid fa-user"></i>
					<p>User</p>
				</div>
				<div class="icon-box">
					<i class="fa-solid fa-envelope"></i>
					<p>Envelope</p>
				</div>
				<div class="icon-box">
					<i class="fa-solid fa-phone"></i>
					<p>Phone</p>
				</div>
				<div class="icon-box">
					<i class="fa-solid fa-cart-shopping"></i>
					<p>Cart</p>
				</div>
				<div class="icon-box">
					<i class="fa-solid fa-heart"></i>
					<p>Heart</p>
				</div>
			</div>
			<div class="button-section">
				<button>Home</button>
				<button>About</button>
				<button>Services</button>
				<button>Portfolio</button>
				<button>Contact</button>
			</div>
			<div class="input-section">
				<input
					type="text"
					placeholder="Click here..." />
			</div>
			<div class="link-section">
				<a
					class="bing"
					href="#"
					>Unvisited link</a
				>
				<a
					class="Visited"
					href="#"
					>Visited Link</a
				>
			</div>
			<div class="card-section">
				<strong>Important Message</strong>
			</div>
			<div class="paragraph-section">
				<p>
					This is the first line of the paragraph.
					This is a paragraph to demonstrate:
				</p>
			</div>
		</div>
	</body>
</html>
